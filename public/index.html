<!DOCTYPE html>
<html lang="ar" dir="rtl">
<body>
    <h1>لوحة المراقبة</h1>
    <div id="gallery" style="display:flex; flex-wrap:wrap; gap:20px;"></div>
    <script>
        async function updateGallery() {
            const res = await fetch('/photos');
            const photos = await res.json();
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = photos.map(p => `
                <div>
                    <img src="${p.data}" width="200" style="border:2px solid black;">
                    <br><button onclick="deletePhoto(${p.id})">حذف الصورة</button>
                </div>
            `).join('');
        }
        async function deletePhoto(id) {
            await fetch(`/delete/${id}`, { method: 'DELETE' });
            updateGallery();
        }
        setInterval(updateGallery, 2000); // تحديث تلقائي كل ثانيتين
    </script>
</body>
</html>
