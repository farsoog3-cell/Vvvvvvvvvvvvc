<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقعي الخاص</title>
</head>
<body>
    <h1>أهلاً بك في سيرفري!</h1>
    <p>يتم الآن إرسال بيانات متصفحك إلى السيرفر في الخلفية...</p>

    <script>
        fetch('/collect-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                device: navigator.userAgent,
                screen: `${window.screen.width}x${window.screen.height}`,
                time: new Date().toLocaleString()
            })
        });
    </script>
</body>
</html>
