<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تطبيق الكاميرا الخاص بي</title>
    <style>
        #video { width: 100%; max-width: 400px; background: #000; }
        #canvas { display: none; } /* مخفي، نستخدمه فقط للمعالجة */
        #photo { width: 100%; max-width: 400px; border: 2px solid #ccc; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>مرحباً بك في تطبيق الكاميرا</h1>
    
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="captureBtn">التقاط صورة</button>

    <h3>الصورة الملتقطة:</h3>
    <img id="photo" src="" alt="ستظهر الصورة هنا بعد الالتقاط">

    <canvas id="canvas" width="400" height="300"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photo = document.getElementById('photo');
        const captureBtn = document.getElementById('captureBtn');

        // 1. فتح الكاميرا عند تحميل الصفحة
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("خطأ في الوصول للكاميرا: ", err);
                alert("يرجى السماح بالوصول للكاميرا");
            }
        }

        // 2. التقاط الصورة
        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            // رسم لقطة الفيديو على الـ Canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            // تحويل الـ Canvas إلى رابط صورة (Data URL) وعرضه
            const data = canvas.toDataURL('image/png');
            photo.setAttribute('src', data);
        });

        startCamera();
    </script>
</body>
</html>
