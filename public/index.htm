<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; margin: 0; }
        .phone { width: 250px; height: 500px; border: 15px solid #000; border-radius: 40px; background: white; display: flex; justify-content: center; align-items: center; font-size: 24px; transition: 0.5s; }
    </style>
</head>
<body>
    <div id="phone" class="phone">جاري التحميل...</div>

    <script>
        // دالة لجلب الحالة كل ثانية
        setInterval(async () => {
            const res = await fetch('/api/status');
            const data = await res.json();
            const phone = document.getElementById('phone');
            phone.innerText = data.status === 'مفتوح' ? 'الهاتف يعمل' : 'الهاتف مغلق';
            phone.style.background = data.status === 'مفتوح' ? '#7cfc00' : 'white';
        }, 1000);
    </script>
</body>
</html>
